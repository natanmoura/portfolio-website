<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Natan Moura — Animator &amp; Motion Designer</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/theme-2-swiss.css" />
</head>
<body>

  <!-- NAV -->
  <header class="site-header">
    <div class="logo-group">
      <a href="/" class="logo">Natan Moura</a>
      <span class="logo-tagline"><span class="tagline-textbox"><span id="taglineText"></span><span class="tagline-highlight" id="taglineHighlight"></span></span><span class="tagline-cursor">_</span></span>
    </div>
    <nav>
      <a href="/#work"><span class="nav-emoji">🪄</span> Projects</a>
      <a href="about.html"><span class="nav-emoji">🧙</span> About</a>
      <a href="contact.html"><span class="nav-emoji">🔮</span> Contact</a>
    </nav>
    <button class="nav-toggle" aria-label="Toggle menu" id="navToggle">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- FULLSCREEN NAV OVERLAY -->
  <div class="nav-overlay" id="navOverlay">
    <a href="/#work"       class="nav-overlay-link">Projects</a>
    <a href="about.html"   class="nav-overlay-link">About</a>
    <a href="contact.html" class="nav-overlay-link">Contact</a>
  </div>

  <!-- MAIN PAGE CONTENT -->
  <div id="main-content">
    <!-- HERO / SHOWREEL -->
    <section class="hero" id="home">
      <div class="hero-video-wrap">
        <iframe
          src="https://player.mux.com/01rbp5MaYnHZ2NCAi00atkyAERad01CAdNbfz8xcqe00Cdk?metadata-video-title=Natan+Moura+Animation+Reel&video-title=Natan+Moura+Animation+Reel&autoplay&muted&loop&endTime=67&poster=https%3A%2F%2Fimage.mux.com%2F01rbp5MaYnHZ2NCAi00atkyAERad01CAdNbfz8xcqe00Cdk%2Fthumbnail.jpg%3Ftime%3D0"
          allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;"
          allowfullscreen
        ></iframe>
      </div>
    </section>

    <!-- PROJECT GALLERY -->
    <section class="section" id="work">
      <h2 class="section-title">Projects</h2>
      <div class="gallery" id="gallery">
        <!-- Items are generated by js/projects.js -->
      </div>
    </section>

    <footer class="site-footer">
      <p><span class="fea-hammer-spacer" aria-hidden="true">🔨 </span>Website vibe coded by me with Claude <span class="fea-hammer">🔨</span></p>
      <p>&copy; <span id="year"></span> Natan Moura</p>
    </footer>
  </div>

  <!-- PROJECT VIEW (replaces main content when a project is open) -->
  <div id="project-view" style="display:none">
    <div id="projectContent"></div>
  </div>

  <script src="js/projects.js?v=3"></script>
  <script src="js/main.js?v=3"></script>
  <script src="js/tagline.js?v=16"></script>
</body>
</html>
