<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Natan Moura</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧙</text></svg>" />
  <link rel="stylesheet" href="css/style.css?v=39" />
  <link rel="stylesheet" href="css/theme-2-swiss.css?v=3" />
</head>
<body class="page-contact">

  <!-- NAV -->
  <header class="site-header">
    <div class="logo-group">
      <a href="/" class="logo">Natan Moura</a>
      <span class="logo-tagline"><span class="tagline-textbox"><span id="taglineText"></span><span class="tagline-highlight" id="taglineHighlight"></span></span><span class="tagline-cursor">_</span></span>
    </div>
    <nav>
      <a href="projects.html"><span class="nav-emoji">🪄</span> Projects</a>
      <a href="about.html"><span class="nav-emoji">🧙</span> About</a>
      <a href="contact.html"><span class="nav-emoji">🔮</span> Contact</a>
    </nav>
    <button class="nav-toggle" aria-label="Toggle menu" id="navToggle">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- FULLSCREEN NAV OVERLAY -->
  <div class="nav-overlay" id="navOverlay">
    <a href="projects.html" class="nav-overlay-link">Projects</a>
    <a href="about.html"   class="nav-overlay-link">About</a>
    <a href="contact.html" class="nav-overlay-link">Contact</a>
  </div>

  <!-- CONTACT -->
  <main>
    <section class="section" style="padding-top: 8rem;">
      <div class="contact fade-in-item">
        <p>Currently open for full-time and freelance work.</p>
        <p>Let's slay some projects together!</p>

        <!-- Slay animation stage -->
        <div class="slay-stage" id="slayStage">
          <span class="slay-exclaim-1" id="slayExclaim1">❗</span>
          <span class="slay-exclaim-2" id="slayExclaim2">❗</span>
          <span class="slay-wizard"    id="slayWizard">🧙</span>
          <span class="slay-elf"       id="slayElf">🧝</span>
          <span class="slay-weapon-wrap" id="slayWeaponWrap"><span id="slayWeapon"></span></span>
          <span class="slay-monster"   id="slayMonster"></span>
        </div>

        <a href="mailto:natanmoura@gmail.com" class="btn" id="contactOpen">Email Me</a>
        <div class="social-links">
          <a href="https://ca.linkedin.com/in/natan-moura-8152a117a" target="_blank" rel="noopener">LinkedIn</a>
          <a href="https://www.instagram.com/natandoodles/" target="_blank" rel="noopener">Instagram</a>
        </div>
      </div>
    </section>
  </main>

  <!-- CONTACT FORM MODAL -->
  <div class="form-modal" id="contactModal" aria-hidden="true">
    <div class="form-modal-backdrop" data-close></div>
    <div class="form-modal-card" role="dialog" aria-modal="true" aria-labelledby="contactModalTitle">
      <button type="button" class="form-modal-close" data-close aria-label="Close">&times;</button>
      <h2 class="section-title form-modal-title" id="contactModalTitle">Contact</h2>

      <form class="contact-form" id="contactForm">
        <!-- Replace with your free key from https://web3forms.com (enter your email, it's emailed to you) -->
        <input type="hidden" name="access_key" value="eda089e6-9d05-4e83-92e1-e6ec7d0280f7" />
        <input type="hidden" name="from_name" value="Portfolio contact form" />
        <!-- Honeypot spam trap (leave empty) -->
        <input type="checkbox" name="botcheck" tabindex="-1" autocomplete="off" style="display:none !important" />

        <div class="form-group">
          <div class="form-name-row">
            <label class="form-field">
              <span class="form-label">First Name</span>
              <input type="text" name="first_name" autocomplete="given-name" required />
            </label>
            <label class="form-field">
              <span class="form-label">Last Name</span>
              <input type="text" name="last_name" autocomplete="family-name" required />
            </label>
          </div>
        </div>

        <label class="form-field">
          <span class="form-label">Email</span>
          <input type="email" name="email" autocomplete="email" required />
        </label>

        <label class="form-field">
          <span class="form-label">Subject</span>
          <input type="text" name="subject" required />
        </label>

        <label class="form-field">
          <span class="form-label">Message</span>
          <textarea name="message" rows="5" required></textarea>
        </label>

        <button type="submit" class="btn form-submit">Send</button>
        <p class="form-status" id="formStatus" role="status" aria-live="polite"></p>
      </form>

      <div class="form-modal-done" id="formDone" aria-hidden="true">
        <p>Sent!<br />✨ I'll be in touch ✨</p>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p><span class="fea-hammer-spacer" aria-hidden="true">🔨 </span>Website vibe-coded by me <span class="fea-hammer">🔨</span></p>
    <p>&copy; <span id="year"></span> Natan Moura</p>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script src="js/fade.js?v=1"></script>
  <script src="js/emoji-fluent.js?v=3"></script>
  <script src="js/main-nav.js?v=1"></script>
  <script src="js/tagline.js?v=20"></script>
  <script src="js/nav-indicator.js?v=4"></script>
  <script src="js/slay-animation.js"></script>
  <script src="js/contact-form.js"></script>
</body>
</html>
